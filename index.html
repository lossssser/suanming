<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>十三的小工具</title>
    <link rel="stylesheet" href="styles.css">
  </head>
  <body>
    <main class="home-shell">
      <header class="home-hero">
        <div>
          <p class="home-kicker">SHXGJQAQ.COM</p>
          <h1>十三的小工具</h1>
          <p class="home-copy">把排盘、解读和个人记录整理在一个入口里。</p>
        </div>
      </header>

      <section class="project-grid" aria-label="项目列表">
        <a class="project-card project-card-primary" href="liuyao.html">
          <div class="project-visual">
            <span class="project-glyph">六</span>
            <div class="hex-lines" aria-hidden="true">
              <span></span>
              <span class="broken"></span>
              <span></span>
              <span class="broken"></span>
              <span></span>
              <span class="broken"></span>
            </div>
          </div>
          <div class="project-body">
            <p class="project-label">已上线</p>
            <h2>六爻排盘</h2>
            <p>铜钱起卦、世应六亲、AI断卦、本地历史记录。</p>
          </div>
          <span class="project-action">进入</span>
        </a>

        <article class="project-card project-card-muted">
          <div class="project-visual">
            <span class="project-glyph">续</span>
            <div class="card-stack" aria-hidden="true">
              <span></span>
              <span></span>
              <span></span>
            </div>
          </div>
          <div class="project-body">
            <p class="project-label">待续</p>
            <h2>新的卡牌</h2>
            <p>预留给下一个术数项目。</p>
          </div>
          <span class="project-action project-action-disabled">待开放</span>
        </article>

        <button class="project-card project-card-feedback" id="feedbackCard" type="button">
          <div class="project-visual">
            <span class="project-glyph">言</span>
            <div class="message-lines" aria-hidden="true">
              <span></span>
              <span></span>
              <span></span>
            </div>
          </div>
          <div class="project-body">
            <p class="project-label">留言建议</p>
            <h2>还想要什么小工具？</h2>
            <p>告诉十三你想增加的功能、玩法或新的卡牌。</p>
          </div>
          <span class="project-action">留言</span>
        </button>
      </section>
    </main>

    <dialog class="feedback-dialog" id="feedbackDialog">
      <form id="feedbackForm" method="dialog">
        <header>
          <h2>想增加什么小工具？</h2>
          <button class="dialog-close" value="cancel" type="submit" aria-label="关闭">×</button>
        </header>
        <label class="feedback-field">
          <span>你的建议</span>
          <textarea id="feedbackText" rows="6" placeholder="例如：想要塔罗抽牌、八字排盘、抽签、每日运势……"></textarea>
        </label>
        <label class="feedback-field">
          <span>联系方式（可空）</span>
          <input id="feedbackContact" type="text" placeholder="邮箱、昵称或其他联系方式">
        </label>
        <p id="feedbackStatus" class="feedback-status"></p>
        <div class="dialog-actions">
          <button class="secondary" value="cancel" type="submit">取消</button>
          <button class="primary" id="sendFeedbackButton" value="default" type="button">发送留言</button>
        </div>
      </form>
    </dialog>

    <script src="home.js?v=20260619-feedback-card"></script>
  </body>
</html>
